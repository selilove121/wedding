<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aayu ❤️ Lokesh</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- OPEN SCREEN -->
<div class="intro">
  <h1>You Are Invited 💌</h1>
  <button onclick="enterSite()">Enter</button>
</div>

<!-- VIDEO -->
<video autoplay muted loop class="bg-video">
  <source src="assets/video.mp4" type="video/mp4">
</video>

<!-- MAIN -->
<div class="main">

  <section class="hero">
    <h1>Aayu ❤️ Lokesh</h1>
    <p>We are getting married</p>
    <div id="countdown"></div>
  </section>

  <section class="events">
    <h2>Wedding Events</h2>

    <div class="card">
      Haldi & Mehndi<br>18 April 2026
    </div>

    <div class="card">
      Wedding Ceremony<br>19 April 2026
    </div>
  </section>

  <section class="gallery">
    <h2>Our Story</h2>
    <img src="assets/couple1.jpg">
    <img src="assets/couple2.jpg">
  </section>

  <section class="venue">
    <h2>Venue</h2>
    <div class="card">
      Rampura, Reni, Alwar<br><br>
      <a href="https://maps.google.com/?q=Rampura Alwar">Open Map</a>
    </div>
  </section>

</div>

<!-- MUSIC -->
<audio id="music" src="assets/music.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
